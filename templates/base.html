<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Job Hunter{% endblock %}</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="alternate icon" href="/favicon.ico">
<link rel="apple-touch-icon" href="/favicon.svg">
<style>
:root{
  --bg:#0f1420; --card:#171e2e; --card2:#1e2739; --line:#2a3550;
  --txt:#e6ecf5; --mut:#94a3c4; --accent:#4f8cff; --accent2:#22c55e;
  --warn:#f59e0b; --pill:#243049;
}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  background:var(--bg);color:var(--txt);line-height:1.5}
a{color:var(--accent);text-decoration:none}
header{background:var(--card);border-bottom:1px solid var(--line);
  position:sticky;top:0;z-index:10}
.wrap{max-width:1080px;margin:0 auto;padding:0 20px}
nav{display:flex;align-items:center;gap:22px;height:60px}
nav .brand{font-weight:700;font-size:18px;margin-right:auto}
nav .brand span{color:var(--accent)}
nav a{color:var(--mut);font-weight:500;position:relative}
nav a.active,nav a:hover{color:var(--txt)}
.badge{background:var(--accent2);color:#04210f;border-radius:10px;
  font-size:11px;font-weight:700;padding:1px 7px;margin-left:5px}
main{padding:26px 0 60px}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;
  padding:18px;margin-bottom:16px}
.btn{background:var(--accent);color:#fff;border:none;border-radius:8px;
  padding:9px 15px;font-weight:600;cursor:pointer;font-size:14px}
.btn.green{background:var(--accent2);color:#04210f}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--txt)}
.btn.sm{padding:5px 10px;font-size:12px}
.btn.danger{background:#3a2130;color:#ff9db0;border:1px solid #5a2b3d}
input,select{background:var(--card2);border:1px solid var(--line);color:var(--txt);
  border-radius:8px;padding:9px 11px;font-size:14px}
input::placeholder{color:var(--mut)}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.flash{background:#13351f;border:1px solid #1f6b3a;color:#9defb9;
  padding:10px 14px;border-radius:8px;margin-bottom:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.stat{background:var(--card2);border-radius:10px;padding:14px}
.stat .n{font-size:24px;font-weight:700}
.stat .l{color:var(--mut);font-size:12px;text-transform:uppercase;letter-spacing:.5px}
.pill{background:var(--pill);color:var(--mut);border-radius:20px;
  padding:3px 10px;font-size:12px;display:inline-block}
.muted{color:var(--mut)}
table{width:100%;border-collapse:collapse}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(0,0,0,.25);
  border-top-color:currentColor;border-radius:50%;animation:spin .7s linear infinite;
  vertical-align:-2px;margin-right:5px}
@keyframes spin{to{transform:rotate(360deg)}}
button[disabled]{opacity:.75;cursor:progress}
.pager{display:flex;flex-wrap:wrap;gap:6px;align-items:center;justify-content:center;margin:20px 0 6px}
.pgbtn{min-width:34px;height:34px;padding:0 10px;background:var(--card);border:1px solid var(--line);
  color:var(--txt);border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit}
.pgbtn:hover:not([disabled]):not(.active){border-color:var(--accent);color:var(--accent)}
.pgbtn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700;cursor:default}
.pgbtn[disabled]{opacity:.4;cursor:default}
.pgdots{color:var(--mut);padding:0 2px}
/* Modal de confirmación dentro de la página (en vez del confirm() del navegador) */
.modal-overlay{position:fixed;inset:0;background:rgba(6,10,18,.62);backdrop-filter:blur(2px);
  display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border:1px solid var(--line);border-radius:14px;
  max-width:430px;width:100%;padding:22px 22px 18px;
  box-shadow:0 24px 60px -24px rgba(0,0,0,.85);animation:modalIn .16s ease-out}
@keyframes modalIn{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:none}}
.modal h4{margin:0 0 8px;font-size:17px}
.modal p{margin:0 0 18px;color:var(--mut);font-size:14px}
.modal .row{justify-content:flex-end}
/* Bloques de IA colapsables (resumen de opiniones, ¿encajo aquí?, etc.) */
details.ai-box{margin-top:8px;background:var(--card2);border-radius:10px;
  border-left:3px solid var(--accent);overflow:hidden}
details.ai-box.ok{border-left-color:var(--accent2)}
details.ai-box.warn{border-left-color:var(--warn)}
details.ai-box>summary{list-style:none;cursor:pointer;padding:10px 14px;
  display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;
  color:var(--txt);user-select:none}
details.ai-box>summary::-webkit-details-marker{display:none}
details.ai-box>summary:hover{background:rgba(255,255,255,.03)}
details.ai-box>summary .chev{margin-left:auto;color:var(--mut);font-size:11px;
  transition:transform .18s}
details.ai-box[open]>summary .chev{transform:rotate(180deg)}
details.ai-box .ai-body{padding:2px 14px 12px}
details.ai-box .ai-body>*:first-child{margin-top:0}
/* Interruptor (toggle switch) reutilizable — color "on" vía --sw-on */
.switch{display:inline-flex;align-items:center;gap:10px;cursor:pointer;
  font-size:14px;font-weight:600;user-select:none}
.switch>input{position:absolute;opacity:0;width:0;height:0}
.switch .track{position:relative;flex:0 0 auto;width:44px;height:24px;border-radius:24px;
  background:var(--line);transition:background .18s}
.switch .knob{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;
  background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.4);transition:transform .18s}
.switch>input:checked+.track{background:var(--sw-on,var(--accent2))}
.switch>input:checked+.track .knob{transform:translateX(20px)}
.switch>input:focus-visible+.track{outline:2px solid var(--accent);outline-offset:2px}
</style>
<script>
// Spinner al enviar formularios lentos (marcados con class="busy")
document.addEventListener('submit', function(e){
  var f = e.target;
  if(!f.classList || !f.classList.contains('busy')) return;
  var b = f.querySelector('button[type=submit]') || f.querySelector('button');
  if(b && !b.disabled){
    b.disabled = true;
    b.innerHTML = '<span class="spinner"></span>' + (b.getAttribute('data-busy') || 'Cargando…');
  }
});

// Paginador de cliente reutilizable
window.jhPaginate = function(listEl, itemSel, size, pagerEl){
  if(!listEl || !pagerEl) return;
  var items = Array.prototype.slice.call(listEl.querySelectorAll(itemSel));
  if(items.length <= size){ pagerEl.style.display = 'none'; return; }
  var pages = Math.ceil(items.length / size), cur = 1;
  function btn(label, page, o){
    o = o || {}; var b = document.createElement('button');
    b.className = 'pgbtn' + (o.active ? ' active' : ''); b.textContent = label;
    if(o.disabled || o.active) b.disabled = true;
    else b.addEventListener('click', function(){ cur = page; render();
      listEl.scrollIntoView({behavior:'smooth', block:'start'}); });
    return b;
  }
  function render(){
    items.forEach(function(el, i){
      el.style.display = (i >= (cur-1)*size && i < cur*size) ? '' : 'none';
    });
    pagerEl.innerHTML = '';
    pagerEl.appendChild(btn('‹', cur-1, {disabled: cur===1}));
    var start = Math.max(1, cur-2), end = Math.min(pages, start+4); start = Math.max(1, end-4);
    if(start > 1){ pagerEl.appendChild(btn('1', 1, {}));
      if(start > 2){ var d=document.createElement('span'); d.className='pgdots'; d.textContent='…'; pagerEl.appendChild(d); } }
    for(var p=start; p<=end; p++) pagerEl.appendChild(btn(String(p), p, {active: p===cur}));
    if(end < pages){ if(end < pages-1){ var d2=document.createElement('span'); d2.className='pgdots'; d2.textContent='…'; pagerEl.appendChild(d2); }
      pagerEl.appendChild(btn(String(pages), pages, {})); }
    pagerEl.appendChild(btn('›', cur+1, {disabled: cur===pages}));
  }
  render();
};
</script>
</head>
<body>
<header><div class="wrap"><nav>
  <div class="brand">Job<span>Hunter</span></div>
  <a href="{{ url_for('index') }}" class="{{ 'active' if request.endpoint=='index' }}">Empleos</a>
  <a href="{{ url_for('companies') }}" class="{{ 'active' if request.endpoint=='companies' }}">Compañías</a>
  <a href="{{ url_for('cv_page') }}" class="{{ 'active' if request.endpoint=='cv_page' }}">Mi CV</a>
  <a href="{{ url_for('searches') }}" class="{{ 'active' if request.endpoint=='searches' }}">Búsquedas</a>
  <a href="{{ url_for('notifications') }}" class="{{ 'active' if request.endpoint=='notifications' }}">
    Notificaciones<span id="notif-badge" class="badge" style="display:none"></span></a>
  <a href="{{ url_for('architecture_page') }}">Arquitectura</a>
</nav></div></header>
<main><div class="wrap">
  {% with msgs = get_flashed_messages() %}
    {% for m in msgs %}<div class="flash">{{ m }}</div>{% endfor %}
  {% endwith %}
  {% block body %}{% endblock %}
</div></main>

<div class="modal-overlay" id="confirm-modal" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
  <div class="modal">
    <h4 id="confirm-title">¿Confirmar?</h4>
    <p id="confirm-msg"></p>
    <div class="row">
      <button type="button" class="btn ghost" id="confirm-cancel">Cancelar</button>
      <button type="button" class="btn danger" id="confirm-ok">Confirmar</button>
    </div>
  </div>
</div>

<script>
// Confirmación in-page reutilizable. Un <form data-confirm="mensaje"> muestra este
// modal en vez del confirm() del navegador; con data-confirm-danger usa el estilo
// destructivo, y data-confirm-title / data-confirm-label personalizan el texto.
(function(){
  var overlay = document.getElementById('confirm-modal');
  var titleEl = document.getElementById('confirm-title');
  var msgEl   = document.getElementById('confirm-msg');
  var okBtn   = document.getElementById('confirm-ok');
  var cancelBtn = document.getElementById('confirm-cancel');
  var pending = null;
  function close(){ overlay.classList.remove('open'); pending = null; }
  function open(opts){
    titleEl.textContent = opts.title || '¿Confirmar?';
    msgEl.textContent = opts.message || '';
    okBtn.textContent = opts.confirmLabel || 'Confirmar';
    okBtn.className = 'btn ' + (opts.danger ? 'danger' : 'green');
    pending = opts.onConfirm;
    overlay.classList.add('open');
    okBtn.focus();
  }
  okBtn.addEventListener('click', function(){ var fn = pending; close(); if(fn) fn(); });
  cancelBtn.addEventListener('click', close);
  overlay.addEventListener('click', function(e){ if(e.target === overlay) close(); });
  document.addEventListener('keydown', function(e){
    if(e.key === 'Escape' && overlay.classList.contains('open')) close();
  });
  window.jhConfirm = open;

  // Intercepta en fase de captura (antes del spinner .busy) los formularios marcados.
  document.addEventListener('submit', function(e){
    var f = e.target;
    if(!f.getAttribute) return;
    var msg = f.getAttribute('data-confirm');
    if(!msg) return;
    e.preventDefault();
    e.stopPropagation();
    open({
      title: f.getAttribute('data-confirm-title') || '¿Confirmar?',
      message: msg,
      confirmLabel: f.getAttribute('data-confirm-label') || 'Confirmar',
      danger: f.hasAttribute('data-confirm-danger'),
      onConfirm: function(){ f.submit(); }
    });
  }, true);
})();

async function poll(){
  try{const r=await fetch("{{ url_for('api_unread') }}");const d=await r.json();
    const b=document.getElementById('notif-badge');
    if(d.unread>0){b.textContent=d.unread;b.style.display='inline-block';}
    else{b.style.display='none';}
  }catch(e){}
}
poll();setInterval(poll,30000);
</script>
</body>
</html>
