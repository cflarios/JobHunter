<!doctype html>
<html lang="es" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JobHunter · Flujo</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%230b1020'/><circle cx='20' cy='32' r='6' fill='%235a90ff'/><circle cx='44' cy='20' r='6' fill='%2334d399'/><circle cx='44' cy='44' r='6' fill='%23a78bfa'/><path d='M26 32 L38 21 M26 33 L38 43' stroke='%23405078' stroke-width='2' fill='none'/></svg>">
<style>html,body{margin:0;height:100%;background:#0b1020}</style>
</head>
<body>
<style>
:root{
  --ground:#0b1020; --grid:#161d33; --panel:#141d31; --panel2:#1b2540;
  --line:#2a3554; --text:#e7edf7; --muted:#93a3c6; --faint:#5f6d95;
  --blue:#5a90ff; --green:#34d399; --violet:#a78bfa; --amber:#f5b34a; --slate:#8595bd;
  --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
  --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
}
:root[data-theme="light"]{
  --ground:#eef1f8; --grid:#dde2ef; --panel:#ffffff; --panel2:#eef1f9;
  --line:#d4dae9; --text:#151b2c; --muted:#54607e; --faint:#95a0bc;
  --blue:#2f6bff; --green:#0f9d6b; --violet:#7c53e6; --amber:#b9740f; --slate:#5a6a8c;
}
@media (prefers-color-scheme: light){
  :root:not([data-theme="dark"]){
    --ground:#eef1f8; --grid:#dde2ef; --panel:#ffffff; --panel2:#eef1f9;
    --line:#d4dae9; --text:#151b2c; --muted:#54607e; --faint:#95a0bc;
    --blue:#2f6bff; --green:#0f9d6b; --violet:#7c53e6; --amber:#b9740f; --slate:#5a6a8c;
  }
}
*{box-sizing:border-box}
.wf{font-family:var(--sans);color:var(--text);background:var(--ground);
  height:100vh;min-height:560px;display:flex;flex-direction:column;overflow:hidden}
.wf .bar{display:flex;align-items:center;gap:16px;padding:12px 18px;border-bottom:1px solid var(--line);
  background:color-mix(in srgb,var(--panel) 82%,transparent);backdrop-filter:blur(6px);z-index:5;flex-wrap:wrap}
.wf .brand{font-weight:800;font-size:16px;letter-spacing:-.01em;margin-right:2px}
.wf .brand b{color:var(--blue)}
.wf .sub{font-family:var(--mono);font-size:11px;color:var(--faint);letter-spacing:.04em}
.wf .legend{display:flex;gap:14px;flex-wrap:wrap;margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--muted)}
.wf .legend span{display:inline-flex;align-items:center;gap:6px}
.wf .legend i{width:10px;height:10px;border-radius:3px;display:inline-block}
.wf .tools{display:flex;gap:6px}
.wf .tools button{font-family:var(--mono);font-size:12px;background:var(--panel2);color:var(--text);
  border:1px solid var(--line);border-radius:8px;padding:6px 10px;cursor:pointer}
.wf .tools button:hover{border-color:var(--blue);color:var(--blue)}
.wf .tools button:focus-visible{outline:2px solid var(--blue);outline-offset:2px}

.wf .stage{position:relative;flex:1;overflow:hidden;cursor:grab;
  background-color:var(--ground);
  background-image:radial-gradient(var(--grid) 1.15px, transparent 1.15px);
  background-size:26px 26px}
.wf .stage.grabbing{cursor:grabbing}
.wf #world{position:absolute;left:0;top:0;transform-origin:0 0;will-change:transform}
.wf svg.edges{position:absolute;left:0;top:0;overflow:visible;pointer-events:none}
.wf .edge{fill:none;stroke-width:1.7;opacity:.5;transition:opacity .18s,stroke-width .18s}
.wf .edge.dash{stroke-dasharray:5 6}
@media (prefers-reduced-motion:no-preference){
  .wf .edge.flow{stroke-dasharray:7 9;animation:dash 1.1s linear infinite}
  @keyframes dash{to{stroke-dashoffset:-32}}
}
.wf .node{position:absolute;width:162px;background:var(--panel);border:1px solid var(--line);
  border-radius:12px;padding:10px 12px;box-shadow:0 10px 24px -18px rgba(0,0,0,.8);
  border-left:3px solid var(--nc,var(--slate));transition:transform .15s,box-shadow .15s,border-color .15s,opacity .18s;
  cursor:default}
.wf .node:hover{transform:translateY(-2px);box-shadow:0 16px 30px -18px rgba(0,0,0,.9)}
.wf .node .nt{font-size:13px;font-weight:700;line-height:1.2;letter-spacing:-.01em}
.wf .node .ns{font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-top:3px;letter-spacing:.02em}
.wf .node .tag{position:absolute;top:-9px;right:9px;font-family:var(--mono);font-size:9px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--nc);background:var(--panel);padding:1px 6px;border:1px solid var(--line);border-radius:20px}
.wf .node .port{position:absolute;top:50%;width:8px;height:8px;border-radius:50%;background:var(--nc);
  transform:translateY(-50%);opacity:.55}
.wf .node .port.in{left:-5px}.wf .node .port.out{right:-5px}

/* dim / highlight */
.wf #world.dim .node{opacity:.28}
.wf #world.dim .edge{opacity:.08}
.wf #world.dim .node.hot{opacity:1}
.wf #world.dim .edge.hot{opacity:.95;stroke-width:2.4}

.wf .hint{position:absolute;left:16px;bottom:14px;font-family:var(--mono);font-size:11px;color:var(--faint);
  background:color-mix(in srgb,var(--panel) 70%,transparent);border:1px solid var(--line);border-radius:8px;
  padding:6px 10px;pointer-events:none}
.wf .zlvl{position:absolute;right:16px;bottom:14px;font-family:var(--mono);font-size:11px;color:var(--muted);
  background:color-mix(in srgb,var(--panel) 70%,transparent);border:1px solid var(--line);border-radius:8px;padding:6px 10px}
</style>

<div class="wf">
  <div class="bar">
    <div class="brand">Job<b>Hunter</b> · Flujo</div>
    <div class="sub">workflow de procesos</div>
    <div class="legend">
      <span><i style="background:var(--blue)"></i>Ingesta</span>
      <span><i style="background:var(--green)"></i>Datos</span>
      <span><i style="background:var(--violet)"></i>Web / Cliente</span>
      <span><i style="background:var(--amber)"></i>Externo (IA)</span>
    </div>
    <div class="tools">
      <button id="fit">Ajustar</button>
      <button id="zin">+</button>
      <button id="zout">−</button>
    </div>
  </div>
  <div class="stage" id="stage">
    <div id="world">
      <svg class="edges" id="edges"></svg>
    </div>
    <div class="hint">Arrastra para mover · rueda para zoom · pasa el cursor sobre un nodo para ver sus conexiones</div>
    <div class="zlvl" id="zlvl">100%</div>
  </div>
</div>

<script>
(function(){
  var COL = {blue:'var(--blue)',green:'var(--green)',violet:'var(--violet)',amber:'var(--amber)',slate:'var(--slate)'};
  var HEX = {blue:'#5a90ff',green:'#34d399',violet:'#a78bfa',amber:'#f5b34a',slate:'#8595bd'};

  // ---- Grafo: nodos (col = columna lógica) ----
  var NODES = [
    {id:'timer',   c:0, k:'blue',  t:'Timer 12:00',   s:'systemd · diario',  tag:'cron'},
    {id:'user',    c:0, k:'blue',  t:'Usuario',       s:'Buscar ahora',      tag:'ui'},
    {id:'run_sh',  c:1, k:'blue',  t:'run_search.sh', s:'wrapper del cron'},
    {id:'run_all', c:1, k:'blue',  t:'run_all()',     s:'orquesta búsquedas'},
    {id:'run_srch',c:1, k:'blue',  t:'run_search()',  s:'consulta + filtra'},
    {id:'remotive',c:2, k:'blue',  t:'Remotive',      s:'API'},
    {id:'remoteok',c:2, k:'blue',  t:'RemoteOK',      s:'API'},
    {id:'jobicy',  c:2, k:'blue',  t:'Jobicy',        s:'API'},
    {id:'himalaya',c:2, k:'blue',  t:'Himalayas',     s:'API'},
    {id:'wwr',     c:2, k:'blue',  t:'WeWorkRemotely',s:'RSS ×2'},
    {id:'arbeit',  c:2, k:'blue',  t:'Arbeitnow',     s:'API'},
    {id:'muse',    c:2, k:'blue',  t:'The Muse',      s:'API'},
    {id:'nomads',  c:2, k:'blue',  t:'Working Nomads',s:'API'},
    {id:'landing', c:2, k:'blue',  t:'Landing.jobs',  s:'API · salario'},
    {id:'getonbrd',c:2, k:'blue',  t:'Get on Board',  s:'API · LATAM'},
    {id:'linkedin',c:2, k:'amber', t:'LinkedIn',      s:'RapidAPI', tag:'key'},
    {id:'f_title', c:3, k:'green', t:'title_ok()',    s:'rol en el título',  tag:'filtro'},
    {id:'f_loc',   c:3, k:'green', t:'location_ok()', s:'zona · no geo-lock'},
    {id:'f_win',   c:3, k:'green', t:'ventana',       s:'≤ N días'},
    {id:'f_dedup', c:3, k:'green', t:'dedup',         s:'URL única'},
    {id:'t_jobs',  c:4, k:'green', t:'jobs',          s:'tabla',  tag:'sqlite'},
    {id:'t_notif', c:4, k:'green', t:'notifications', s:'tabla'},
    {id:'t_srch',  c:4, k:'green', t:'searches',      s:'config'},
    {id:'t_set',   c:4, k:'green', t:'settings',      s:'config'},
    {id:'t_rev',   c:4, k:'green', t:'company_reviews',s:'caché'},
    {id:'flask',   c:5, k:'violet',t:'Flask · app.py',s:'13 rutas', tag:'web'},
    {id:'r_index', c:5, k:'violet',t:'Empleos',       s:'GET /'},
    {id:'r_comp',  c:5, k:'violet',t:'Compañías',     s:'GET /companies'},
    {id:'r_sum',   c:5, k:'violet',t:'/companies/summary',s:'POST · AJAX'},
    {id:'api_un',  c:5, k:'violet',t:'/api/unread',   s:'badge 30s'},
    {id:'api_js',  c:5, k:'violet',t:'/api/jobs-status',s:'barra 45s'},
    {id:'reviews', c:6, k:'amber', t:'reviews.py',    s:'resumen empresas', tag:'ia'},
    {id:'cv_py',   c:6, k:'amber', t:'cv.py',         s:'CV + IA'},
    {id:'gemini',  c:6, k:'amber', t:'Gemini 2.5',    s:'grounding · JSON'},
    {id:'r_cv',    c:5, k:'violet',t:'Mi CV',         s:'/cv'},
    {id:'t_prof',  c:4, k:'green', t:'profile',       s:'CV · perfil'},
    {id:'t_match', c:4, k:'green', t:'job_matches',   s:'afinidad'},
    {id:'browser', c:7, k:'violet',t:'Navegador',     s:'LAN · usuario', tag:'cliente'}
  ];
  // ---- Aristas: kind = normal|config|poll|ext|ret ----
  var SRC = ['remotive','remoteok','jobicy','himalaya','wwr','arbeit','muse','nomads','landing','getonbrd','linkedin'];
  var EDGES = [
    ['timer','run_sh'],['run_sh','run_all'],['user','run_all'],['run_all','run_srch']
  ];
  SRC.forEach(function(s){ EDGES.push(['run_srch',s]); EDGES.push([s,'f_title']); });
  EDGES.push(
    ['f_title','f_loc'],['f_loc','f_win'],['f_win','f_dedup'],['f_dedup','t_jobs'],
    ['run_srch','t_notif','config'],
    ['t_srch','run_all','config'],['t_set','run_all','config'],
    ['t_jobs','flask'],['t_notif','flask'],
    ['flask','r_index'],['flask','r_comp'],['flask','r_sum'],['flask','api_un'],['flask','api_js'],
    ['flask','t_srch','config'],
    ['r_index','browser'],['r_comp','browser'],
    ['api_un','browser','poll'],['api_js','browser','poll'],
    ['browser','r_sum','ext'],
    ['r_sum','reviews','ext'],['reviews','gemini','ext'],['gemini','reviews','ret'],
    ['reviews','t_rev'],['t_rev','r_comp','config'],
    // --- CV + IA ---
    ['flask','r_cv'],['r_cv','browser'],
    ['r_cv','cv_py','ext'],['browser','cv_py','ext'],
    ['cv_py','gemini','ext'],['gemini','cv_py','ret'],
    ['cv_py','t_prof'],['cv_py','t_match'],
    ['t_prof','cv_py','config'],['t_jobs','cv_py','config'],
    ['t_match','r_index','config']
  );

  // ---- Layout por columnas ----
  var NW=162, NH=54, COLGAP=250, GY=24, PAD=60;
  var byCol={}; NODES.forEach(function(n){ (byCol[n.c]=byCol[n.c]||[]).push(n); });
  var maxH=0;
  Object.keys(byCol).forEach(function(c){
    var arr=byCol[c], h=arr.length*NH+(arr.length-1)*GY; maxH=Math.max(maxH,h);
  });
  Object.keys(byCol).forEach(function(c){
    var arr=byCol[c], h=arr.length*NH+(arr.length-1)*GY, y0=PAD+(maxH-h)/2;
    arr.forEach(function(n,i){ n.x=PAD+(+c)*COLGAP; n.y=y0+i*(NH+GY); });
  });
  var WW = PAD*2 + 8*COLGAP - (COLGAP-NW);
  var WH = PAD*2 + maxH;
  var NMAP={}; NODES.forEach(function(n){ NMAP[n.id]=n; });

  var world=document.getElementById('world');
  var svg=document.getElementById('edges');
  svg.setAttribute('width',WW); svg.setAttribute('height',WH);

  // markers (una flecha por color)
  var defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
  Object.keys(HEX).forEach(function(k){
    var m=document.createElementNS('http://www.w3.org/2000/svg','marker');
    m.setAttribute('id','ar-'+k); m.setAttribute('viewBox','0 0 10 10');
    m.setAttribute('refX','8'); m.setAttribute('refY','5'); m.setAttribute('markerWidth','6');
    m.setAttribute('markerHeight','6'); m.setAttribute('orient','auto-start-reverse');
    var p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d','M0 0 L10 5 L0 10 z'); p.setAttribute('fill',HEX[k]);
    m.appendChild(p); defs.appendChild(m);
  });
  svg.appendChild(defs);

  function edgeStyle(kind, from){
    if(kind==='config') return {k:'slate', cls:'edge dash'};
    if(kind==='poll')   return {k:'violet',cls:'edge dash flow'};
    if(kind==='ext')    return {k:'amber', cls:'edge flow'};
    if(kind==='ret')    return {k:'amber', cls:'edge dash'};
    return {k:from.k, cls:'edge flow'};
  }
  var edgeEls=[];
  EDGES.forEach(function(e){
    var a=NMAP[e[0]], b=NMAP[e[1]], kind=e[2]||'normal';
    var st=edgeStyle(kind,a);
    var x1=a.x+NW, y1=a.y+NH/2, x2=b.x, y2=b.y+NH/2;
    // si la arista va "hacia atrás" (config/ret), sale por la izquierda del origen
    if(x2 < x1){ x1=a.x; }
    var dx=Math.max(40,Math.abs(x2-x1)*0.5);
    var c1x=x1+(x2>=x1?dx:-dx), c2x=x2-(x2>=x1?dx:-dx);
    var path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d','M'+x1+' '+y1+' C'+c1x+' '+y1+' '+c2x+' '+y2+' '+x2+' '+y2);
    path.setAttribute('class',st.cls);
    path.setAttribute('stroke',HEX[st.k]);
    path.setAttribute('marker-end','url(#ar-'+st.k+')');
    path.dataset.from=e[0]; path.dataset.to=e[1];
    svg.appendChild(path); edgeEls.push(path);
  });

  // nodos
  NODES.forEach(function(n){
    var d=document.createElement('div');
    d.className='node'; d.style.left=n.x+'px'; d.style.top=n.y+'px';
    d.style.setProperty('--nc', COL[n.k]);
    d.dataset.id=n.id;
    d.innerHTML =
      (n.tag?'<span class="tag">'+n.tag+'</span>':'')+
      '<div class="nt">'+n.t+'</div><div class="ns">'+n.s+'</div>'+
      '<span class="port in"></span><span class="port out"></span>';
    d.addEventListener('mouseenter',function(){ highlight(n.id); });
    d.addEventListener('mouseleave',clearHl);
    world.appendChild(d);
  });
  var nodeEls={}; world.querySelectorAll('.node').forEach(function(el){ nodeEls[el.dataset.id]=el; });

  function highlight(id){
    world.classList.add('dim');
    nodeEls[id].classList.add('hot');
    edgeEls.forEach(function(p){
      if(p.dataset.from===id||p.dataset.to===id){
        p.classList.add('hot');
        nodeEls[p.dataset.from].classList.add('hot');
        nodeEls[p.dataset.to].classList.add('hot');
      }
    });
  }
  function clearHl(){
    world.classList.remove('dim');
    world.querySelectorAll('.hot').forEach(function(el){ el.classList.remove('hot'); });
  }

  // ---- pan / zoom ----
  var stage=document.getElementById('stage'), zlvl=document.getElementById('zlvl');
  var tx=0,ty=0,sc=1;
  function apply(){ world.style.transform='translate('+tx+'px,'+ty+'px) scale('+sc+')'; zlvl.textContent=Math.round(sc*100)+'%'; }
  function fit(){
    var r=stage.getBoundingClientRect();
    var s=Math.min((r.width-40)/WW,(r.height-40)/WH); s=Math.min(s,1.1);
    sc=s; tx=(r.width-WW*s)/2; ty=(r.height-WH*s)/2; apply();
  }
  function zoomAt(cx,cy,factor){
    var ns=Math.max(0.3,Math.min(2.2,sc*factor));
    tx=cx-(cx-tx)*(ns/sc); ty=cy-(cy-ty)*(ns/sc); sc=ns; apply();
  }
  stage.addEventListener('wheel',function(e){
    e.preventDefault();
    var r=stage.getBoundingClientRect();
    zoomAt(e.clientX-r.left,e.clientY-r.top, e.deltaY<0?1.12:0.89);
  },{passive:false});
  var drag=false,px,py;
  stage.addEventListener('mousedown',function(e){
    if(e.target.closest('.node'))return;
    drag=true;px=e.clientX;py=e.clientY;stage.classList.add('grabbing');
  });
  window.addEventListener('mousemove',function(e){
    if(!drag)return; tx+=e.clientX-px; ty+=e.clientY-py; px=e.clientX; py=e.clientY; apply();
  });
  window.addEventListener('mouseup',function(){ drag=false;stage.classList.remove('grabbing'); });
  // touch básico
  stage.addEventListener('touchstart',function(e){
    if(e.touches.length===1&&!e.target.closest('.node')){drag=true;px=e.touches[0].clientX;py=e.touches[0].clientY;}
  },{passive:true});
  stage.addEventListener('touchmove',function(e){
    if(drag&&e.touches.length===1){tx+=e.touches[0].clientX-px;ty+=e.touches[0].clientY-py;px=e.touches[0].clientX;py=e.touches[0].clientY;apply();}
  },{passive:true});
  stage.addEventListener('touchend',function(){drag=false;});

  document.getElementById('fit').addEventListener('click',fit);
  document.getElementById('zin').addEventListener('click',function(){var r=stage.getBoundingClientRect();zoomAt(r.width/2,r.height/2,1.15);});
  document.getElementById('zout').addEventListener('click',function(){var r=stage.getBoundingClientRect();zoomAt(r.width/2,r.height/2,0.87);});
  window.addEventListener('resize',fit);
  fit();
})();
</script>

</body>
</html>
